<!DOCTYPE html>
<html class="light" lang="uz">
<head>
<meta charset="utf-8" />
<meta content="width=device-width, initial-scale=1.0" name="viewport" />
<title>Hujjatlar arxivi — Dream International</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=IBM+Plex+Sans:wght@400;600;700&family=JetBrains+Mono&family=Material+Symbols+Outlined&display=swap" rel="stylesheet" />
<script src="/js/tailwind-config.js"></script>
<style>.material-symbols-outlined{vertical-align:middle}</style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen">
<aside id="sidebar" class="fixed left-0 top-0 h-screen w-[280px] bg-surface-container-low border-r border-outline-variant flex flex-col py-gutter px-4 z-50"></aside>
<main class="ml-[280px] min-h-screen flex flex-col">
  <header id="header" class="h-16 flex justify-between items-center px-margin-desktop bg-surface-container-lowest border-b border-outline-variant sticky top-0 z-40"></header>
  <section class="p-margin-desktop flex-1">
    <div class="mb-stack-lg">
      <h2 class="font-headline-lg text-headline-lg">Hujjatlar arxivi</h2>
      <p class="text-on-surface-variant mt-1">Barcha tarjima qilingan hujjatlar shu yerda saqlanadi.</p>
    </div>
    <!-- Filtrlar -->
    <div class="bg-surface-container-lowest border border-outline-variant p-gutter flex flex-wrap gap-stack-md items-end mb-stack-md rounded">
      <div class="flex-1 min-w-[200px]">
        <label class="font-label-caps text-label-caps text-outline mb-1 block">Qidiruv</label>
        <input id="searchInput" placeholder="Fayl nomi..." class="w-full bg-surface border border-outline-variant rounded py-2 px-3 focus:ring-1 focus:ring-secondary outline-none" />
      </div>
      <div class="min-w-[180px]">
        <label class="font-label-caps text-label-caps text-outline mb-1 block">Hujjat turi</label>
        <select id="typeFilter" class="w-full bg-surface border border-outline-variant rounded py-2 px-3 focus:ring-1 focus:ring-secondary outline-none">
          <option value="">Barchasi</option>
        </select>
      </div>
      <div class="min-w-[160px]">
        <label class="font-label-caps text-label-caps text-outline mb-1 block">Holat</label>
        <select id="statusFilter" class="w-full bg-surface border border-outline-variant rounded py-2 px-3 focus:ring-1 focus:ring-secondary outline-none">
          <option value="">Barchasi</option>
          <option value="done">Tayyor</option>
          <option value="processing">Jarayonda</option>
          <option value="error">Xatolik</option>
        </select>
      </div>
      <label class="flex items-center gap-2 mb-2 cursor-pointer">
        <input id="mineOnly" type="checkbox" class="rounded border-outline-variant text-secondary focus:ring-secondary" />
        <span class="font-label-caps text-label-caps">Faqat meniki</span>
      </label>
    </div>
    <!-- Jadval -->
    <div class="bg-surface-container-lowest border border-outline-variant overflow-hidden rounded">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-surface-container-low border-b border-outline-variant">
              <th class="px-stack-lg py-3 font-label-caps text-label-caps text-on-surface-variant uppercase">Fayl</th>
              <th class="px-stack-lg py-3 font-label-caps text-label-caps text-on-surface-variant uppercase">Tur</th>
              <th class="px-stack-lg py-3 font-label-caps text-label-caps text-on-surface-variant uppercase">Yo'nalish</th>
              <th class="px-stack-lg py-3 font-label-caps text-label-caps text-on-surface-variant uppercase">Hajm</th>
              <th class="px-stack-lg py-3 font-label-caps text-label-caps text-on-surface-variant uppercase">Tarjimon</th>
              <th class="px-stack-lg py-3 font-label-caps text-label-caps text-on-surface-variant uppercase">Holat</th>
              <th class="px-stack-lg py-3 font-label-caps text-label-caps text-on-surface-variant uppercase">Sana</th>
              <th class="px-stack-lg py-3 font-label-caps text-label-caps text-on-surface-variant uppercase text-right">Yuklab olish</th>
            </tr>
          </thead>
          <tbody id="rows" class="divide-y divide-outline-variant"></tbody>
        </table>
      </div>
    </div>
  </section>
</main>
<script type="module">
import { api, renderLayout, escapeHtml, formatDate, formatBytes, STATUS_BADGE } from '/js/common.js';
await renderLayout('/archive.html', 'Hujjatlar arxivi');

const TYPE_LABELS = {};
const { documentTypes } = await api('/api/stats/meta');
const typeFilter = document.getElementById('typeFilter');
documentTypes.forEach((t) => {
  TYPE_LABELS[t.key] = t.label;
  typeFilter.insertAdjacentHTML('beforeend', `<option value="${t.key}">${escapeHtml(t.label)}</option>`);
});

const rowsEl = document.getElementById('rows');
const searchInput = document.getElementById('searchInput');
const statusFilter = document.getElementById('statusFilter');
const mineOnly = document.getElementById('mineOnly');

async function load() {
  const params = new URLSearchParams();
  if (searchInput.value.trim()) params.set('q', searchInput.value.trim());
  if (typeFilter.value) params.set('type', typeFilter.value);
  if (statusFilter.value) params.set('status', statusFilter.value);
  if (mineOnly.checked) params.set('mine', '1');
  const { documents } = await api('/api/documents?' + params.toString());
  render(documents);
}

function render(docs) {
  if (!docs.length) {
    rowsEl.innerHTML = '<tr><td colspan="8" class="px-stack-lg py-8 text-center text-on-surface-variant">Hujjat topilmadi</td></tr>';
    return;
  }
  rowsEl.innerHTML = docs.map((d) => {
    const b = STATUS_BADGE[d.status] || STATUS_BADGE.pending;
    const dl = d.status === 'done'
      ? `<a href="/api/documents/${d.id}/download?which=translated" class="px-3 py-1 bg-primary text-on-primary text-[10px] font-bold rounded hover:opacity-90">TARJIMA</a>`
      : '<span class="text-on-surface-variant text-[10px]">—</span>';
    return `<tr class="hover:bg-surface-container transition-colors align-top">
      <td class="px-stack-lg py-4 font-body-md font-bold">${escapeHtml(d.original_name)}</td>
      <td class="px-stack-lg py-4">${escapeHtml(TYPE_LABELS[d.doc_type] || d.doc_type)}</td>
      <td class="px-stack-lg py-4 font-code-sm uppercase">${d.source_lang} → ${d.target_lang}</td>
      <td class="px-stack-lg py-4 font-code-sm text-on-surface-variant">${formatBytes(d.size_bytes)}</td>
      <td class="px-stack-lg py-4">${escapeHtml(d.translator)}</td>
      <td class="px-stack-lg py-4"><span class="px-2 py-0.5 text-[10px] font-bold rounded ${b.cls}">${b.label}</span></td>
      <td class="px-stack-lg py-4 font-code-sm text-on-surface-variant">${formatDate(d.created_at)}</td>
      <td class="px-stack-lg py-4 text-right flex gap-2 justify-end">
        <a href="/api/documents/${d.id}/download?which=original" class="px-3 py-1 border border-outline-variant text-[10px] font-bold rounded hover:bg-surface-container">ASL</a>
        ${dl}
      </td>
    </tr>`;
  }).join('');
}

let timer;
searchInput.addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(load, 300); });
[typeFilter, statusFilter, mineOnly].forEach((el) => el.addEventListener('change', load));
await load();
</script>
</body>
</html>
