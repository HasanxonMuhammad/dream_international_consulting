<!DOCTYPE html>
<html class="light" lang="uz">
<head>
<meta charset="utf-8" />
<meta content="width=device-width, initial-scale=1.0" name="viewport" />
<title>Boshqaruv paneli — Dream International</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=IBM+Plex+Sans:wght@400;600;700&family=JetBrains+Mono&family=Material+Symbols+Outlined&display=swap" rel="stylesheet" />
<script src="/js/tailwind-config.js"></script>
<style>.material-symbols-outlined{vertical-align:middle}</style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen">
<aside id="sidebar" class="fixed left-0 top-0 h-screen w-[280px] bg-surface-container-low border-r border-outline-variant flex flex-col py-gutter px-4 z-50"></aside>
<main class="ml-[280px] min-h-screen flex flex-col">
  <header id="header" class="h-16 flex justify-between items-center px-margin-desktop bg-surface-container-lowest border-b border-outline-variant sticky top-0 z-40"></header>
  <div class="p-margin-desktop space-y-stack-lg flex-grow">
    <!-- Kartalar -->
    <div id="cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-stack-lg"></div>
    <!-- Faollik + hujjat turlari -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-stack-lg">
      <div class="lg:col-span-2 bg-surface-container-lowest border border-outline-variant flex flex-col">
        <div class="p-stack-lg border-b border-outline-variant flex justify-between items-center">
          <h3 class="font-headline-sm text-headline-sm">So'nggi faollik</h3>
        </div>
        <div id="recent" class="divide-y divide-outline-variant"></div>
      </div>
      <div class="bg-surface-container-lowest border border-outline-variant p-stack-lg">
        <h3 class="font-headline-sm text-headline-sm mb-stack-lg">Hujjat turlari bo'yicha hajm</h3>
        <div id="byType" class="space-y-stack-md"></div>
      </div>
    </div>
    <!-- Pipeline jadval -->
    <div class="bg-surface-container-lowest border border-outline-variant overflow-hidden">
      <div class="p-stack-lg border-b border-outline-variant flex justify-between items-center">
        <h3 class="font-headline-sm text-headline-sm">So'nggi hujjatlar</h3>
        <a href="/archive.html" class="text-secondary font-label-caps text-label-caps hover:underline">BARCHASI</a>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-surface-container-low border-b border-outline-variant">
              <th class="px-stack-lg py-3 font-label-caps text-label-caps text-on-surface-variant uppercase">Hujjat</th>
              <th class="px-stack-lg py-3 font-label-caps text-label-caps text-on-surface-variant uppercase">Yo'nalish</th>
              <th class="px-stack-lg py-3 font-label-caps text-label-caps text-on-surface-variant uppercase">Holat</th>
              <th class="px-stack-lg py-3 font-label-caps text-label-caps text-on-surface-variant uppercase">Tarjimon</th>
              <th class="px-stack-lg py-3 font-label-caps text-label-caps text-on-surface-variant uppercase text-right">Vaqt</th>
            </tr>
          </thead>
          <tbody id="pipeline" class="divide-y divide-outline-variant"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>
<script type="module">
import { api, renderLayout, escapeHtml, formatDate, STATUS_BADGE } from '/js/common.js';
await renderLayout('/dashboard.html', 'Boshqaruv paneli');

const data = await api('/api/stats/dashboard');
const c = data.cards;

const change = c.todayChangePercent;
const changeText = change === null ? 'Birinchi ma\'lumotlar' : `${change >= 0 ? '+' : ''}${change}% kechagiga nisbatan`;
const cardDefs = [
  { label: 'Bugungi tarjimalar', value: c.today, sub: changeText, icon: 'translate', color: 'text-secondary' },
  { label: 'Jarayonda', value: c.processing, sub: 'Tarjima qilinmoqda', icon: 'pending_actions', color: 'text-error' },
  { label: 'Yakunlangan (jami)', value: c.done, sub: 'Barcha vaqt', icon: 'task_alt', color: 'text-on-secondary-fixed-variant' },
  { label: 'Bugun faol xodimlar', value: c.activeTranslators, sub: `${c.errors} xatolik`, icon: 'group', color: 'text-secondary' },
];
document.getElementById('cards').innerHTML = cardDefs.map((d) => `
  <div class="bg-surface-container-lowest border border-outline-variant p-stack-lg flex flex-col justify-between h-32">
    <div class="flex justify-between items-start">
      <span class="font-label-caps text-label-caps text-on-surface-variant">${d.label}</span>
      <span class="material-symbols-outlined ${d.color}">${d.icon}</span>
    </div>
    <div>
      <p class="font-headline-lg text-headline-lg">${d.value}</p>
      <p class="font-code-sm text-code-sm text-on-surface-variant">${escapeHtml(d.sub)}</p>
    </div>
  </div>`).join('');

const ACTION_LABEL = {
  login: { t: 'Tizimga kirdi', icon: 'login', cls: 'bg-surface-container-high text-secondary' },
  upload: { t: 'Hujjat yukladi', icon: 'upload_file', cls: 'bg-surface-container-high text-secondary' },
  translate_done: { t: 'Tarjima tayyor', icon: 'auto_awesome', cls: 'bg-secondary-container text-on-secondary-container' },
  translate_error: { t: 'Tarjimada xatolik', icon: 'warning', cls: 'bg-error-container text-on-error-container' },
  download: { t: 'Yuklab oldi', icon: 'download', cls: 'bg-surface-container-high text-secondary' },
};
document.getElementById('recent').innerHTML = data.recent.length ? data.recent.map((r) => {
  const a = ACTION_LABEL[r.action] || { t: r.action, icon: 'info', cls: 'bg-surface-container-high text-secondary' };
  return `<div class="p-stack-lg flex gap-stack-lg items-start hover:bg-surface-container transition-colors">
    <div class="p-2 rounded-lg ${a.cls}"><span class="material-symbols-outlined">${a.icon}</span></div>
    <div class="flex-grow">
      <div class="flex justify-between">
        <h4 class="font-body-lg text-body-lg font-bold">${a.t}</h4>
        <span class="font-code-sm text-code-sm text-on-surface-variant">${formatDate(r.created_at)}</span>
      </div>
      <p class="text-body-md text-on-surface-variant">${escapeHtml(r.user || '')}${r.detail ? ' — ' + escapeHtml(r.detail) : ''}</p>
    </div>
  </div>`;
}).join('') : '<p class="p-stack-lg text-on-surface-variant">Hozircha faollik yo\'q</p>';

document.getElementById('byType').innerHTML = data.byType.length ? data.byType.map((t) => `
  <div>
    <div class="flex justify-between mb-1">
      <span class="font-label-caps text-label-caps">${escapeHtml(t.label)}</span>
      <span class="font-code-sm text-code-sm">${t.percent}%</span>
    </div>
    <div class="h-2 bg-surface-container rounded-full overflow-hidden">
      <div class="h-full bg-secondary" style="width:${t.percent}%"></div>
    </div>
  </div>`).join('') : '<p class="text-on-surface-variant">Ma\'lumot yo\'q</p>';

document.getElementById('pipeline').innerHTML = data.pipeline.length ? data.pipeline.map((d) => {
  const b = STATUS_BADGE[d.status] || STATUS_BADGE.pending;
  return `<tr class="hover:bg-surface-container transition-colors">
    <td class="px-stack-lg py-4 font-body-md font-bold">${escapeHtml(d.original_name)}</td>
    <td class="px-stack-lg py-4 font-code-sm uppercase">${d.source_lang} → ${d.target_lang}</td>
    <td class="px-stack-lg py-4"><span class="px-2 py-0.5 text-[10px] font-bold rounded ${b.cls}">${b.label}</span></td>
    <td class="px-stack-lg py-4 text-body-md">${escapeHtml(d.translator)}</td>
    <td class="px-stack-lg py-4 text-right font-code-sm text-on-surface-variant">${formatDate(d.created_at)}</td>
  </tr>`;
}).join('') : '<tr><td colspan="5" class="px-stack-lg py-8 text-center text-on-surface-variant">Hozircha hujjat yo\'q</td></tr>';
</script>
</body>
</html>
