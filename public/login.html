<!DOCTYPE html>
<html class="light" lang="uz">
<head>
<meta charset="utf-8" />
<meta content="width=device-width, initial-scale=1.0" name="viewport" />
<title>Kirish — Dream International Consulting</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=IBM+Plex+Sans:wght@400;600;700&family=Material+Symbols+Outlined&display=swap" rel="stylesheet" />
<script src="/js/tailwind-config.js"></script>
<style>.material-symbols-outlined{vertical-align:middle}</style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center font-body-md">
<div class="w-full max-w-md p-margin-desktop">
  <div class="text-center mb-stack-lg">
    <div class="inline-flex w-14 h-14 bg-primary rounded-lg items-center justify-center mb-stack-md">
      <span class="material-symbols-outlined text-on-primary text-3xl">translate</span>
    </div>
    <h1 class="font-headline-md text-headline-md font-bold">Dream International</h1>
    <p class="font-label-caps text-label-caps text-on-surface-variant opacity-70">Tarjima boshqaruv tizimi</p>
  </div>
  <div class="bg-surface-container-lowest border border-outline-variant rounded-lg shadow-sm p-stack-lg">
    <h2 class="font-headline-sm text-headline-sm mb-stack-md">Ismingizni tanlang</h2>
    <p class="text-on-surface-variant text-body-md mb-stack-lg">Hisobotda ishlaringiz to'g'ri ko'rinishi uchun o'z ismingiz bilan kiring.</p>
    <div id="userList" class="flex flex-col gap-stack-sm max-h-[50vh] overflow-y-auto"></div>
    <p id="error" class="text-error text-body-md hidden mt-stack-md"></p>
  </div>
  <p class="text-center text-on-surface-variant text-code-sm mt-stack-md opacity-60">© Dream International Consulting</p>
</div>
<script type="module">
const listEl = document.getElementById('userList');
const errEl = document.getElementById('error');

async function load() {
  const res = await fetch('/api/auth/users');
  const { users } = await res.json();
  listEl.innerHTML = users.map((u) => `
    <button data-id="${u.id}" class="user-btn flex items-center gap-3 p-3 border border-outline-variant rounded-lg text-left hover:border-secondary hover:bg-surface-container-high transition-all">
      <span class="h-9 w-9 rounded-full bg-primary text-on-primary flex items-center justify-center font-label-caps text-label-caps">${(u.fullName || '?').split(' ').map((s) => s[0]).join('').slice(0, 2).toUpperCase()}</span>
      <span class="font-body-lg">${u.fullName}</span>
    </button>`).join('');
  listEl.querySelectorAll('.user-btn').forEach((b) => b.addEventListener('click', () => select(b.dataset.id)));
}

async function select(userId) {
  errEl.classList.add('hidden');
  try {
    const res = await fetch('/api/auth/select', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: Number(userId) }),
    });
    if (!res.ok) throw new Error((await res.json()).error || 'Xatolik');
    location.href = '/dashboard.html';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  }
}
load();
</script>
</body>
</html>
